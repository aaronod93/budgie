<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Color Palette Definitions -->
    <style>
      /* --- STYLING & COLOR SCHEME --- */
      .bg { fill: #b9ced6; }
      .shadow { fill: #a2b7bf; opacity: 0.7; }
      
      .pig-body { fill: #2ba1ac; }
      .pig-dark { fill: #134e56; }
      
      .coin-gold { fill: #f1aa3a; }
      .coin-dark { fill: #b27419; }
      .coin-text { font-family: 'Arial Black', 'Impact', sans-serif; font-size: 22px; font-weight: 900; fill: #b27419; text-anchor: middle; }

      /* --- ANIMATION TIMINGS & PHYSICS --- */
      :root {
        --loop-speed: 2.4s;
      }

      /* Continuous subtle reactive bounce for the piggy bank */
      #piggy-bank {
        animation: pigBounce 0.4s infinite ease-in-out;
        transform-origin: 400px 460px;
      }

      /* Staggered Endless Coin Flow */
      .coin {
        animation-duration: var(--loop-speed);
        animation-iteration-count: infinite;
        animation-timing-function: cubic-bezier(0.47, 0, 0.745, 0.715); /* Natural acceleration */
        opacity: 0;
      }

      #coin1 { animation-name: dropCoin1; animation-delay: 0.0s; }
      #coin2 { animation-name: dropCoin2; animation-delay: 0.4s; }
      #coin3 { animation-name: dropCoin3; animation-delay: 0.8s; }
      #coin4 { animation-name: dropCoin4; animation-delay: 1.2s; }
      #coin5 { animation-name: dropCoin5; animation-delay: 1.6s; }
      #coin6 { animation-name: dropCoin6; animation-delay: 2.0s; }

      /* --- COIN ANIMATION PATHS (Matching the Sequence Frame Angles) --- */
      @keyframes dropCoin1 {
        0%   { transform: translate(320px, -80px) rotate(-15deg) scale(1); opacity: 1; }
        85%  { transform: translate(390px, 220px) rotate(-5deg) scale(0.9); opacity: 1; }
        90%  { transform: translate(400px, 250px) rotate(0deg) scale(0.4); opacity: 0; }
        100% { transform: translate(400px, 250px) opacity: 0; }
      }

      @keyframes dropCoin2 {
        0%   { transform: translate(460px, -80px) rotate(35deg) scale(1); opacity: 1; }
        85%  { transform: translate(410px, 220px) rotate(10deg) scale(0.9); opacity: 1; }
        90%  { transform: translate(400px, 250px) rotate(0deg) scale(0.4); opacity: 0; }
        100% { transform: translate(400px, 250px) opacity: 0; }
      }

      @keyframes dropCoin3 {
        0%   { transform: translate(360px, -80px) rotate(-40deg) scale(1); opacity: 1; }
        85%  { transform: translate(395px, 220px) rotate(-15deg) scale(0.9); opacity: 1; }
        90%  { transform: translate(400px, 250px) rotate(0deg) scale(0.4); opacity: 0; }
        100% { transform: translate(400px, 250px) opacity: 0; }
      }

      @keyframes dropCoin4 {
        0%   { transform: translate(430px, -80px) rotate(20deg) scale(1); opacity: 1; }
        85%  { transform: translate(405px, 220px) rotate(5deg) scale(0.9); opacity: 1; }
        90%  { transform: translate(400px, 250px) rotate(0deg) scale(0.4); opacity: 0; }
        100% { transform: translate(400px, 250px) opacity: 0; }
      }

      @keyframes dropCoin5 {
        0%   { transform: translate(340px, -80px) rotate(-25deg) scale(1); opacity: 1; }
        85%  { transform: translate(392px, 220px) rotate(-8deg) scale(0.9); opacity: 1; }
        90%  { transform: translate(400px, 250px) rotate(0deg) scale(0.4); opacity: 0; }
        100% { transform: translate(400px, 250px) opacity: 0; }
      }

      @keyframes dropCoin6 {
        0%   { transform: translate(450px, -80px) rotate(45deg) scale(1); opacity: 1; }
        85%  { transform: translate(408px, 220px) rotate(12deg) scale(0.9); opacity: 1; }
        90%  { transform: translate(400px, 250px) rotate(0deg) scale(0.4); opacity: 0; }
        100% { transform: translate(400px, 250px) opacity: 0; }
      }

      /* --- PIGGY REACTION --- */
      @keyframes pigBounce {
        0%, 100% { transform: scale(1, 1); }
        50%      { transform: scale(1.03, 0.97) translateY(2px); }
      }
    </style>

    <!-- Reusable Flat Coin Template -->
    <g id="coin-asset">
      <circle cx="0" cy="0" r="32" class="coin-gold" stroke="#b27419" stroke-width="4" />
      <circle cx="0" cy="0" r="24" fill="none" stroke="#b27419" stroke-width="2" stroke-dasharray="6 4" opacity="0.5" />
      <text x="0" y="8" class="coin-text">$</text>
    </g>
  </defs>

  <!-- Background Canvas -->
  <rect width="800" height="600" class="bg" />

  <!-- Ambient Ground Shadow -->
  <ellipse cx="400" cy="485" rx="140" ry="16" class="shadow" />

  <!-- ==================== COIN STREAM (BACKGROUND LAYER) ==================== -->
  <g id="all-coins">
    <use href="#coin-asset" id="coin1" class="coin" />
    <use href="#coin-asset" id="coin2" class="coin" />
    <use href="#coin-asset" id="coin3" class="coin" />
    <use href="#coin-asset" id="coin4" class="coin" />
    <use href="#coin-asset" id="coin5" class="coin" />
    <use href="#coin-asset" id="coin6" class="coin" />
  </g>

  <!-- ==================== FLAT PIGGY BANK SYSTEM ==================== -->
  <g id="piggy-bank">
    <!-- Back Feet Shadow/Extensions -->
    <path d="M 315 440 L 315 475 C 315 485, 350 485, 350 475 L 350 440 Z" class="pig-dark" />
    <path d="M 450 440 L 450 475 C 450 485, 485 485, 485 475 L 485 440 Z" class="pig-dark" />

    <!-- Left & Right Minimalist Ears -->
    <path d="M 285 290 C 265 220, 335 225, 335 270 Z" class="pig-body" stroke="#134e56" stroke-width="4.5" stroke-linejoin="round" />
    <path d="M 515 290 C 535 220, 465 225, 465 270 Z" class="pig-body" stroke="#134e56" stroke-width="4.5" stroke-linejoin="round" />

    <!-- Main Front-Facing Rounded Body -->
    <path d="M 260 360 
             C 260 270, 320 250, 400 250 
             C 480 250, 540 270, 540 360 
             C 540 440, 480 460, 400 460 
             C 320 460, 260 440, 260 360 Z" 
          class="pig-body" stroke="#134e56" stroke-width="5.5" stroke-linejoin="round" />

    <!-- Front Left & Right Stubby Legs -->
    <path d="M 325 445 L 325 480 C 325 492, 365 492, 365 480 L 365 445 Z" class="pig-body" stroke="#134e56" stroke-width="5" stroke-linejoin="round" />
    <path d="M 435 445 L 435 480 C 435 492, 475 492, 475 480 L 475 445 Z" class="pig-body" stroke="#134e56" stroke-width="5" stroke-linejoin="round" />

    <!-- The Top Coin Slot Lip -->
    <ellipse cx="400" cy="256" rx="35" ry="8" class="pig-dark" />

    <!-- Symmetrical Front-Facing Face Features -->
    <!-- Eyes -->
    <circle cx="345" cy="330" r="8" class="pig-dark" />
    <circle cx="455" cy="330" r="8" class="pig-dark" />

    <!-- Center Snout Structure -->
    <ellipse cx="400" cy="385" rx="45" ry="32" class="pig-body" stroke="#134e56" stroke-width="5" />
    <!-- Nostrils -->
    <ellipse cx="382" cy="385" rx="6" ry="10" class="pig-dark" />
    <ellipse cx="418" cy="385" rx="6" ry="10" class="pig-dark" />

    <!-- Cute Curved Happy Smile -->
    <path d="M 355 415 Q 400 445 445 415" fill="none" stroke="#134e56" stroke-width="5" stroke-linecap="round" />
  </g>

</svg>
