name: mobile

on:
  push:
    branches: [main]
    paths: ["mobile/**", ".github/workflows/mobile.yml"]
  pull_request:
    paths: ["mobile/**", ".github/workflows/mobile.yml"]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
